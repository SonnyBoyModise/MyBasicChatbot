# GitHub Actions CI for MyBasicChatbot Part 3 (WPF + MySQL)
name: .NET CI Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest  # Required for WPF (net8.0-windows)
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore NuGet packages
        run: dotnet restore

      - name: Build in Release mode
        run: dotnet build --no-restore --configuration Release

      - name: Done
        run: echo "MyBasicChatbot Part 3 built successfully!"
